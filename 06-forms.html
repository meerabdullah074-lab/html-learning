<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms HTML</title>
</head>

<body>
    <h1>Student Registration Form</h1>
    <form action="/submit" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" required><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" min="0" required><br><br>

        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">Female</label>
        <input type="radio" id="other" name="gender" value="other" required>
        <label for="other">Other</label><br><br>

        <input type="submit" value="Register">
        <br><br>
        <label for="skills">Skills:</label>
        <input type="text" id="skills" name="skills"><br><br>



        <label for="Html">HTML:</label>
        <input type="checkbox" id="html" name="skills" value="HTML">


        <label for="css">CSS:</label>
        <input type="checkbox" id="css" name="skills" value="CSS">

        <label for="javascript">JavaScript:</label>
        <input type="checkbox" id="javascript" name="skills" value="JavaScript">
        <br><br>

        <select name="country" id="country">
            <option value="pakistan">Pakistan</option>
            <option value="canada">Canada</option>
            <option value="uk">UK</option>
            <option value="australia">Australia</option>

        </select>
          <br><br>
        <textarea name="address" id="address" cols="30" rows="2" placeholder="Enter your address"></textarea>

        <br><br>
         <input type="submit" value="Register">


    </form>
</body>

</html>
